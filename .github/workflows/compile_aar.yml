name: Build LiteRT-LM AAR

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'v0.10.2'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Bazel
        run: |
          # 加上 sudo 解决权限问题
          sudo npm install -g @bazel/bazelisk

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653' 

      - name: Configure and Build
        run: |
          # 自动配置
          echo -e "y\n\n\n\n\n\n" | python3 configure.py
          
          # 执行编译
          bazel build --config=android_arm64 //runtime/bindings/java:litertlm_android

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-aar
          path: |
            bazel-bin/runtime/bindings/java/*.aar
            bazel-bin/java/*.aar
          if-no-files-found: warn
