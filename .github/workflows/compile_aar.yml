name: Build LiteRT-LM AAR

on:
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 确保拉取正确的 Tag
          ref: 'v0.10.2'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Bazel
        run: |
          npm install -g @bazel/bazelisk

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # LiteRT 通常推荐使用 NDK r25b
          ndk-version: '25.2.9519653' 

      - name: Configure and Build
        run: |
          # 自动应答 configure.py
          # 第一个 'y' 确认 Android 构建，后续回车使用默认路径
          echo -e "y\n\n\n\n\n\n" | python3 configure.py
          
          # 执行编译
          # 注意：如果 //runtime/bindings/java:litertlm_android 报错
          # 请根据源码 BUILD 文件确认目标名称
          bazel build --config=android_arm64 //runtime/bindings/java:litertlm_android

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-android-aar
          # 这里的路径会根据编译结果生成，通常在 bazel-bin 下
          path: |
            bazel-bin/runtime/bindings/java/*.aar
            bazel-bin/java/*.aar
          if-no-files-found: warn
