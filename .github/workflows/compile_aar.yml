name: 编译 sangxiaonian LiteRT-LM AAR

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: 检出源码 (v0.10.2)
        uses: actions/checkout@v4
        with:
          ref: 'v0.10.2'

      - name: 环境准备 (Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk
          # 设置 Bazel 版本环境变量，Bazelisk 会自动读取
          echo "USE_BAZEL_VERSION=7.6.1" >> $GITHUB_ENV

      - name: 配置 Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # 使用 25.1.8937393 版本
          ndk-version: '25.1.8937393' 

      - name: 编译 AAR 库
        run: |
          # 1. 设置 Bazel 识别的关键环境变量
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          
          # 2. 运行配置脚本 (如果存在)
          # 这一步通常会生成 .bazelrc 或修改 WORKSPACE 写入 NDK 路径
          if [ -f "configure.py" ]; then
            echo "正在运行 configure.py..."
            echo -e "y\n\n\n\n\n" | python3 configure.py
          fi

          # 3. 执行编译
          # 注意：移除了 --android_ndk 参数
          # 使用 --action_env 确保环境变量传递给 Bazel 动作
          bazel build --config=android_arm64 \
            --noenable_bzlmod \
            --action_env=ANDROID_NDK_HOME=$ANDROID_NDK_HOME \
            --action_env=ANDROID_HOME=$ANDROID_HOME \
            --local_ram_resources=HOST_RAM*.6 \
            //kotlin/java/com/google/ai/edge/litertlm:litertlm-android

      - name: 上传 AAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-v0.10.2-aar
          path: |
            bazel-bin/**/*.aar
          if-no-files-found: error
