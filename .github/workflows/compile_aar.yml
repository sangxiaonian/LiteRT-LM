name: 编译 sangxiaonian LiteRT-LM AAR

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          ref: 'v0.10.2'

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk
          export USE_BAZEL_VERSION=7.6.1

      - name: 准备 Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.1.8937393' 

      - name: 直接执行编译
        run: |
          # 注入环境变量，Bazel 会自动读取这些变量来配置 Android 工具链
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393

          # 在 v0.10.2 中，Bazel 会自动识别环境，无需运行 configure.py
          # 我们直接尝试编译 AAR
          # 注意：--noenable_bzlmod 是为了兼容旧版依赖解析
          bazel build --config=android_arm64 \
            --noenable_bzlmod \
            --local_ram_resources=HOST_RAM*.6 \
            //runtime/bindings/java:litertlm_android

      - name: 上传 AAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-aar-sangxiaonian
          path: |
            bazel-bin/runtime/bindings/java/*.aar
          if-no-files-found: error
