name: Build LiteRT-LM Android Binary

on:
  push:
    tags:
      - 'v0.10.2' # 仅在推送此 tag 时触发
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: v0.10.2 # 强制检出 v0.10.2 源码

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk-version: 26.1.10909125 # 建议与 WORKSPACE 中的 NDK 版本保持一致

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.6.1
        with:
          bazelisk-version: 'latest'

      - name: Configure Bazel
        run: |
          # 自动配置 WORKSPACE 中的 Android 路径
          ./configure --android_sdk_path=$ANDROID_HOME --android_ndk_path=$ANDROID_NDK_HOME

      - name: Build Binary with Bazel
        run: |
          # 编译目标已替换为 //runtime/engine:litert_lm_main
          # 针对 Android ARM64 架构进行优化编译
          bazel build -c opt --config=android_arm64 //runtime/engine:litert_lm_main

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-binary
          # 编译产物通常位于 bazel-bin 下对应的路径中
          path: bazel-bin/runtime/engine/litert_lm_main
