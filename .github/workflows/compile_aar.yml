name: 编译 sangxiaonian LiteRT-LM AAR

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: 检出源码 (v0.10.2)
        uses: actions/checkout@v4
        with:
          ref: 'v0.10.2'

      - name: 环境准备 (Java 17 & Python 3.10)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk
          export USE_BAZEL_VERSION=7.6.1

      - name: 配置 Android SDK & NDK (r25b)
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.1.8937393' 

      - name: 编译 AAR 库
        run: |
          # 1. 自动校准 NDK 路径
          # 有时 setup-android 安装的路径名会有微小差异，这里进行动态定位
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -name "25.*" | head -n 1)
          export ANDROID_NDK_HOME=$NDK_PATH
          
          echo "检查 NDK 路径: $ANDROID_NDK_HOME"
          ls -d $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64 || echo "警告：未发现工具链目录"

          # 2. 运行配置脚本
          if [ -f "configure.py" ]; then
            echo -e "y\n\n\n\n\n\n" | python3 configure.py
          fi

          # 3. 执行编译
          # 使用 --repo_env 将 NDK 路径注入到仓库规则中
          # 使用 --local_ram_resources 防止 GitHub 服务器内存溢出
          bazel build --config=android_arm64 \
            --noenable_bzlmod \
            --repo_env=ANDROID_NDK_HOME=$ANDROID_NDK_HOME \
            --local_ram_resources=HOST_RAM*.6 \
            --local_cpu_resources=2 \
            //kotlin/java/com/google/ai/edge/litertlm:litertlm-android

      - name: 上传 AAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-v0.10.2-aar
          # 自动搜索生成的 aar 文件
          path: |
            bazel-bin/**/*.aar
          if-no-files-found: error
