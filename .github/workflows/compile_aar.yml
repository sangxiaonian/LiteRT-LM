name: 编译 sangxiaonian LiteRT-LM AAR

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: 检出源码 (v0.10.2)
        uses: actions/checkout@v4
        with:
          ref: 'v0.10.2'

      - name: 环境准备
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk
          export USE_BAZEL_VERSION=7.6.1

      - name: 配置 Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.1.8937393' 

      - name: 编译 AAR 库
        run: |
          # 自动定位 NDK 路径
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          # 强制指定 NDK 完整路径，解决 readdir 报错
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          
          # 1. 运行配置
          if [ -f "configure.py" ]; then
            echo -e "y\n\n\n\n\n" | python3 configure.py
          fi

          # 2. 执行编译
          # 显式传入 --android_ndk 路径，防止 rules_android_ndk 找错位置
          bazel build --config=android_arm64 \
            --noenable_bzlmod \
            --android_ndk=$ANDROID_NDK_HOME \
            --local_ram_resources=HOST_RAM*.6 \
            //kotlin/java/com/google/ai/edge/litertlm:litertlm-android

      - name: 上传 AAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-v0.10.2-aar
          path: |
            bazel-bin/**/*.aar
          if-no-files-found: error
